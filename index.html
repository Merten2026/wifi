<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Wi-Fi доступ</title>

  <style>
    :root {
      --bg: #0b0f17;
      --card: rgba(28, 28, 30, 0.72);
      --text: #ffffff;
      --sub: #a1a1aa;
      --accent: #0a84ff;
      --border: rgba(255,255,255,0.08);
      --success: #34c759;
    }

    body.light {
      --bg: #f2f2f7;
      --card: rgba(255,255,255,0.8);
      --text: #000;
      --sub: #6b7280;
      --border: rgba(0,0,0,0.08);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      padding: 24px;

      font-family: -apple-system, BlinkMacSystemFont, Arial;

      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
    }

    .card {
      width: 100%;
      max-width: 420px;

      background: var(--card);
      backdrop-filter: blur(20px);

      border: 1px solid var(--border);

      border-radius: 28px;

      padding: 28px;

      text-align: center;

      box-shadow: 0 20px 60px rgba(0,0,0,0.35);

      position: relative;
    }

    .theme-btn {
      position: absolute;
      top: 14px;
      right: 14px;

      width: 38px;
      height: 38px;

      border-radius: 10px;

      background: rgba(120,120,128,0.18);

      border: none;

      cursor: pointer;

      font-size: 18px;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wifi-icon {
      font-size: 56px;
      margin-top: 10px;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 700;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 14px;
      color: var(--sub);
      line-height: 1.5;
    }

    .network {
      margin-top: 22px;
      font-size: 20px;
      font-weight: 700;
    }

    .password {
      margin-top: 14px;

      padding: 14px;

      border-radius: 14px;

      background: rgba(120,120,128,0.18);

      font-size: 17px;

      word-break: break-all;
    }

    button.main {
      width: 100%;

      margin-top: 16px;

      padding: 14px;

      border: none;

      border-radius: 14px;

      font-size: 16px;
      font-weight: 600;

      cursor: pointer;

      background: var(--accent);
      color: white;
    }

    .success {
      margin-top: 10px;
      font-size: 13px;
      color: var(--success);
      display: none;
    }

    .hint {
      margin-top: 22px;

      font-size: 13px;

      color: var(--sub);

      line-height: 1.6;

      text-align: left;
    }

    .hint b {
      color: var(--text);
    }
  </style>
</head>

<body>

  <div class="card">

    <button class="theme-btn" onclick="toggleTheme()">🌙</button>

    <div class="wifi-icon">📶</div>

    <h1>Wi-Fi</h1>

    <div class="subtitle">
      Подключение через NFC или вручную
    </div>

    <div class="network">
      NSZK_GUEST
    </div>

    <div class="password">
      A251987m
    </div>

    <button class="main" onclick="copyPassword()">
      Скопировать пароль
    </button>

    <div class="success" id="success">
      Пароль скопирован ✔
    </div>

    <div class="hint">

      <b>iOS / Android</b><br>
      1. Скопируйте пароль<br>
      2. Откройте настройки Wi-Fi<br>
      3. Выберите сеть NSZK_GUEST<br>
      4. Вставьте пароль<br>
      <i>(на Android подключение также может произойти автоматически после выбора сети)</i>

    </div>

  </div>

  <script>
    function copyPassword() {
      navigator.clipboard.writeText("A251987m");
      document.getElementById("success").style.display = "block";
    }

    function toggleTheme() {
      document.body.classList.toggle("light");
    }
  </script>

</body>
</html>
