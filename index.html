<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Guest Wi-Fi</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;

      display: flex;
      justify-content: center;
      align-items: center;

      background: radial-gradient(circle at top, #1e293b 0%, #0f172a 60%);

      color: white;

      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    }

    .card {
      width: 100%;
      max-width: 420px;

      background: rgba(17, 24, 39, 0.85);
      backdrop-filter: blur(18px);

      border: 1px solid rgba(255,255,255,0.08);

      border-radius: 28px;

      padding: 34px;

      text-align: center;

      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .icon {
      font-size: 64px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
    }

    .subtitle {
      margin-top: 10px;
      color: #94a3b8;
      font-size: 15px;
      line-height: 1.5;
    }

    .network {
      margin-top: 28px;
      font-size: 24px;
      font-weight: 700;
    }

    .password {
      margin-top: 16px;
      padding: 16px;

      background: #1e293b;
      border-radius: 16px;

      font-size: 18px;

      word-break: break-all;

      border: 1px solid rgba(255,255,255,0.06);
    }

    button {
      width: 100%;

      margin-top: 18px;

      padding: 16px;

      border: none;
      border-radius: 16px;

      font-size: 18px;
      font-weight: 600;

      cursor: pointer;

      transition: 0.2s;
    }

    .primary {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
    }

    .primary:active {
      transform: scale(0.98);
    }

    .hint {
      margin-top: 24px;
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.6;
    }

    .success {
      margin-top: 12px;
      color: #4ade80;
      display: none;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="icon">📶</div>

    <h1>Guest Wi-Fi</h1>

    <div class="subtitle">
      Tap button to copy password<br>
      then open Wi-Fi settings
    </div>

    <div class="network">
      Home Wi-Fi Shultz
    </div>

    <div class="password" id="password">
      A251987m
    </div>

    <button class="primary" onclick="copyPassword()">
      Copy Password
    </button>

    <div class="success" id="success">
      Password copied ✔
    </div>

    <div class="hint">
      iPhone:<br>
      Settings → Wi-Fi → Home Wi-Fi Shultz<br><br>

      Then paste password manually
    </div>

  </div>

  <script>
    function copyPassword() {
      navigator.clipboard.writeText("A251987m");

      document.getElementById("success").style.display = "block";
    }
  </script>

</body>
</html>
