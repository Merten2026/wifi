<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Wi-Fi Access</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      padding: 24px;

      background: radial-gradient(circle at top, #1e293b, #0f172a);

      font-family: -apple-system, BlinkMacSystemFont, Arial;
      color: white;
    }

    .card {
      width: 100%;
      max-width: 440px;

      background: rgba(17, 24, 39, 0.85);
      backdrop-filter: blur(18px);

      border: 1px solid rgba(255,255,255,0.08);

      border-radius: 28px;

      padding: 34px;

      text-align: center;

      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .icon {
      font-size: 64px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
    }

    .subtitle {
      margin-top: 10px;
      color: #94a3b8;
      font-size: 15px;
    }

    .network {
      margin-top: 26px;
      font-size: 22px;
      font-weight: 700;
    }

    .password {
      margin-top: 14px;

      background: #1e293b;

      padding: 16px;

      border-radius: 16px;

      font-size: 18px;

      word-break: break-all;
    }

    .section-title {
      margin-top: 26px;
      font-size: 14px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .qr {
      margin-top: 12px;

      width: 220px;

      background: white;

      padding: 12px;

      border-radius: 16px;
    }

    button {
      width: 100%;

      margin-top: 18px;

      padding: 16px;

      border: none;

      border-radius: 16px;

      font-size: 18px;
      font-weight: 600;

      cursor: pointer;
    }

    .primary {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
    }

    .secondary {
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .success {
      margin-top: 12px;
      font-size: 14px;
      color: #4ade80;
      display: none;
    }

    .hint {
      margin-top: 20px;
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.6;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="icon">📶</div>

    <h1>Guest Wi-Fi Access</h1>

    <div class="subtitle">
      Connect in seconds using NFC or QR
    </div>

    <div class="network">
      NSZK_GUEST
    </div>

    <div class="password">
      A251987m
    </div>

    <button class="primary" onclick="copyPassword()">
      Copy Password
    </button>

    <div class="success" id="success">
      Password copied ✔
    </div>

    <div class="section-title">
      QR Code (fastest method)
    </div>

    <img
      class="qr"
      src="wifi-qr.png"
      alt="Wi-Fi QR"
    />

    <div class="hint">
      📱 iPhone: scan QR → instant connect<br>
      📶 NFC: opens this page → copy password<br>
      ⚡ Best: QR for fastest connection
    </div>

  </div>

  <script>
    function copyPassword() {
      navigator.clipboard.writeText("A251987m");

      document.getElementById("success").style.display = "block";
    }
  </script>

</body>
</html>
