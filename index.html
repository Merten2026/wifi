<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Home Wi-Fi Shultz</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;

      background:
        radial-gradient(circle at top, #1e293b 0%, #0f172a 50%);

      color: white;

      font-family:
        -apple-system,
        BlinkMacSystemFont,
        Arial,
        sans-serif;

      display: flex;
      justify-content: center;
      align-items: center;

      min-height: 100vh;
    }

    .card {
      width: 100%;
      max-width: 420px;

      background: rgba(17, 24, 39, 0.85);

      backdrop-filter: blur(14px);

      border: 1px solid rgba(255,255,255,0.08);

      border-radius: 28px;

      padding: 34px;

      text-align: center;

      box-shadow:
        0 20px 60px rgba(0,0,0,0.45);
    }

    .wifi-icon {
      font-size: 64px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      font-weight: 700;
    }

    .subtitle {
      color: #94a3b8;

      margin-top: 10px;
      margin-bottom: 28px;

      font-size: 16px;
    }

    .qr-wrapper {
      background: white;

      padding: 14px;

      border-radius: 22px;

      display: inline-block;
    }

    .qr {
      width: 100%;
      max-width: 240px;

      display: block;

      border-radius: 12px;
    }

    .network {
      margin-top: 28px;

      font-size: 26px;

      font-weight: 700;
    }

    .password {
      margin-top: 14px;

      background: #1e293b;

      padding: 16px;

      border-radius: 16px;

      font-size: 18px;

      word-break: break-all;

      border: 1px solid rgba(255,255,255,0.06);
    }

    button {
      margin-top: 18px;

      width: 100%;

      padding: 16px;

      border: none;

      border-radius: 16px;

      background: linear-gradient(
        135deg,
        #2563eb,
        #1d4ed8
      );

      color: white;

      font-size: 18px;
      font-weight: 600;

      cursor: pointer;

      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
    }

    button:active {
      transform: scale(0.98);
    }

    .hint {
      margin-top: 24px;

      color: #94a3b8;

      font-size: 14px;

      line-height: 1.6;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="wifi-icon">
      📶
    </div>

    <h1>Guest Wi-Fi</h1>

    <div class="subtitle">
      Scan QR code to connect
    </div>

    <div class="qr-wrapper">
      <img
        class="qr"
        src="wifi-qr.svg"
        alt="Wi-Fi QR"
      >
    </div>

    <div class="network">
      Home Wi-Fi Shultz
    </div>

    <div class="password" id="password">
      A251987m
    </div>

    <button onclick="copyPassword()">
      Copy Password
    </button>

    <div class="hint">
      iPhone: open Camera and scan QR code<br>
      Android: scan QR or use NFC
    </div>

  </div>

  <script>
    function copyPassword() {
      navigator.clipboard.writeText('A251987m');

      alert('Password copied');
    }
  </script>

</body>
</html>
