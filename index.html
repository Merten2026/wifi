<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Доступ к Wi-Fi</title>

  <style>
    :root {
      --bg: #0b0f17;
      --card: rgba(28, 28, 30, 0.72);
      --text: #ffffff;
      --sub: #a1a1aa;
      --accent: #0a84ff;
      --border: rgba(255,255,255,0.08);
      --success: #34c759;
    }

    body.light {
      --bg: #f2f2f7;
      --card: rgba(255,255,255,0.75);
      --text: #000000;
      --sub: #6b7280;
      --border: rgba(0,0,0,0.08);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 24px;

      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial;

      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
    }

    .card {
      width: 100%;
      max-width: 440px;

      background: var(--card);
      backdrop-filter: blur(20px);

      border: 1px solid var(--border);

      border-radius: 28px;

      padding: 28px;

      text-align: center;

      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      margin-top: 10px;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 14px;
      color: var(--sub);
      line-height: 1.5;
    }

    .wifi-icon {
      font-size: 56px;
      margin: 10px 0;
    }

    .network {
      margin-top: 18px;
      font-size: 20px;
      font-weight: 700;
    }

    .password {
      margin-top: 14px;
      padding: 14px;

      border-radius: 14px;

      background: rgba(120,120,128,0.18);

      font-size: 17px;

      word-break: break-all;
    }

    button {
      width: 100%;

      margin-top: 14px;

      padding: 14px;

      border: none;

      border-radius: 14px;

      font-size: 16px;
      font-weight: 600;

      cursor: pointer;
    }

    .primary {
      background: var(--accent);
      color: white;
    }

    .secondary {
      background: rgba(120,120,128,0.18);
      color: var(--text);
    }

    .success {
      margin-top: 10px;
      font-size: 13px;
      color: var(--success);
      display: none;
    }

    .section {
      margin-top: 22px;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--sub);
    }

    .qr {
      margin-top: 10px;
      width: 200px;
      padding: 10px;
      border-radius: 14px;
      background: white;
    }

    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: var(--sub);
      line-height: 1.5;
    }

    .icon-btn {
      background: rgba(120,120,128,0.18);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      color: var(--text);
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="topbar">
      <div></div>

      <button class="icon-btn" onclick="toggleTheme()">
        🌗 Тема
      </button>
    </div>

    <div class="wifi-icon">📶</div>

    <div class="title">Доступ к Wi-Fi</div>

    <div class="subtitle">
      Поднесите устройство к NFC или используйте QR-код для быстрого подключения
    </div>

    <div class="network">NSZK_GUEST</div>

    <div class="password">A251987m</div>

    <button class="primary" onclick="copyPassword()">
      Скопировать пароль
    </button>

    <div class="success" id="success">
      Пароль скопирован ✔
    </div>

    <div class="section">QR-код (быстрый способ)</div>

    <img class="qr" src="wifi-qr.png" alt="Wi-Fi QR"/>

    <button class="secondary" onclick="copyPassword()">
      Скопировать ещё раз
    </button>

    <div class="hint">
      📱 iPhone: наведите камеру на QR → подключение<br>
      📶 NFC: открывает эту страницу<br>
      ⚡ Рекомендуется: QR для мгновенного подключения
    </div>

  </div>

  <script>
    function copyPassword() {
      navigator.clipboard.writeText("A251987m");
      document.getElementById("success").style.display = "block";
    }

    function toggleTheme() {
      document.body.classList.toggle("light");
    }
  </script>

</body>
</html>
