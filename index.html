<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Wi-Fi Access</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      padding: 24px;

      background: radial-gradient(circle at top, #1e293b, #0f172a);

      font-family: -apple-system, BlinkMacSystemFont, Arial;
      color: white;
    }

    .card {
      width: 100%;
      max-width: 420px;

      background: rgba(17, 24, 39, 0.85);
      backdrop-filter: blur(18px);

      border-radius: 28px;

      padding: 34px;

      text-align: center;

      border: 1px solid rgba(255,255,255,0.08);

      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .icon {
      font-size: 64px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
    }

    .subtitle {
      margin-top: 10px;
      color: #94a3b8;
      font-size: 15px;
    }

    .network {
      margin-top: 28px;
      font-size: 24px;
      font-weight: 700;
    }

    .box {
      margin-top: 16px;
      padding: 16px;

      border-radius: 16px;

      background: #1e293b;

      font-size: 18px;
    }

    a.button {
      display: block;

      margin-top: 18px;

      padding: 16px;

      border-radius: 16px;

      background: linear-gradient(135deg, #2563eb, #1d4ed8);

      color: white;

      text-decoration: none;

      font-weight: 600;

      font-size: 18px;
    }

    a.button:active {
      transform: scale(0.98);
    }

    .hint {
      margin-top: 22px;
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.6;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="icon">📶</div>

    <h1>Guest Wi-Fi</h1>

    <div class="subtitle">
      Tap button → copy password instantly
    </div>

    <div class="network">
      Home Wi-Fi Shultz
    </div>

    <div class="box">
      Password: <b>A251987m</b>
    </div>

    <!-- 🔥 ВАЖНО: сюда вставляется Shortcut -->
    <a class="button" href="shortcuts://run-shortcut?name=WiFi%20Connect">
      Connect Automatically
    </a>

    <div class="hint">
      iPhone: tap button → then go to Settings → Wi-Fi<br>
      Android: use NFC or copy password
    </div>

  </div>

</body>
</html>
